<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arcane Studio</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230c0c0b'/%3E%3Ctext x='16' y='23' text-anchor='middle' font-family='system-ui,sans-serif' font-size='18' font-weight='700' fill='%23c8ff00'%3EA%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=Barlow+Condensed:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --w:#ffffff;--off:#f7f6f3;--k:#0c0c0b;
  --mid:#8a8a84;--line:#e2e0da;
  --acc:#c8ff00;--acc-dim:#a8d800;
  --nav:220px;
  --fs:'Space Grotesk',sans-serif;
  --fd:'Barlow Condensed',sans-serif;
}
html{scroll-behavior:smooth}
body{background:var(--w);color:var(--k);font-family:var(--fs);font-size:14px;line-height:1.6;overflow-x:hidden}
a{color:inherit;text-decoration:none}

/* ── SIDE NAV ─────────────────────────────── */
#sidenav{
  position:fixed;top:0;left:0;bottom:0;width:var(--nav);z-index:300;
  background:var(--k);
  display:flex;flex-direction:column;justify-content:space-between;
  padding:36px 28px 32px;
  border-right:1px solid rgba(255,255,255,.06);
}
.sn-logo{font-family:var(--fs);font-size:11px;font-weight:600;letter-spacing:.28em;text-transform:uppercase;color:var(--w);line-height:1.4}
.sn-logo span{display:block;color:var(--acc);font-weight:300;letter-spacing:.18em;font-size:9px;margin-top:3px}
.sn-links{display:flex;flex-direction:column;gap:2px;margin-top:56px}
.sn-link{
  font-family:var(--fd);font-size:22px;font-weight:400;text-transform:uppercase;
  letter-spacing:.04em;color:rgba(255,255,255,.28);
  padding:8px 0;
  transition:color .2s,transform .2s;
  position:relative;
}
.sn-link::before{content:'';position:absolute;left:-28px;top:50%;transform:translateY(-50%);width:3px;height:0;background:var(--acc);transition:height .25s cubic-bezier(.16,1,.3,1)}
.sn-link:hover{color:var(--w);transform:translateX(4px)}
.sn-link.active{color:var(--w)}
.sn-link.active::before{height:70%}
.sn-bottom{display:flex;flex-direction:column;gap:12px}
.sn-cta{
  font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;
  background:var(--acc);color:var(--k);padding:10px 14px;
  transition:background .2s;text-align:center;
}
.sn-cta:hover{background:var(--acc-dim)}
.sn-socials{display:flex;gap:16px}
.sn-social{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.22);transition:color .2s}
.sn-social:hover{color:var(--acc)}
.sn-copy{font-size:9px;letter-spacing:.08em;color:rgba(255,255,255,.14)}

/* Hamburger for mobile */
#ham{display:none;position:fixed;top:18px;right:18px;z-index:400;width:36px;height:36px;background:var(--k);align-items:center;justify-content:center;flex-direction:column;gap:5px;border:none}
#ham span{display:block;width:20px;height:1.5px;background:var(--w);transition:all .25s}
body.nav-open #ham span:nth-child(1){transform:rotate(45deg) translate(4px,4px)}
body.nav-open #ham span:nth-child(2){opacity:0}
body.nav-open #ham span:nth-child(3){transform:rotate(-45deg) translate(4px,-4px)}
@media(max-width:900px){
  #sidenav{transform:translateX(-100%);transition:transform .3s cubic-bezier(.16,1,.3,1)}
  body.nav-open #sidenav{transform:translateX(0)}
  #ham{display:flex}
  #main{margin-left:0!important}
}

/* ── MAIN CONTENT ─────────────────────────── */
#main{margin-left:var(--nav)}
#app{transition:opacity .25s ease}
#app.fade{opacity:0}

/* ── SHARED ───────────────────────────────── */
.sec-tag{font-size:10px;font-weight:600;letter-spacing:.28em;text-transform:uppercase;color:var(--mid);display:flex;align-items:center;gap:10px}
.sec-tag::before{content:'';width:18px;height:1.5px;background:var(--acc);display:block}
.reveal{opacity:0;transform:translateY(16px);transition:opacity .65s ease,transform .65s ease}
.reveal.in{opacity:1;transform:none}
.btn-fill{display:inline-flex;align-items:center;gap:12px;font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--k);background:var(--acc);padding:14px 28px;transition:background .2s,gap .18s}
.btn-fill:hover{background:var(--acc-dim);gap:18px}
.btn-ghost{display:inline-flex;align-items:center;gap:10px;font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--k);padding:14px 28px;border:1px solid var(--line);transition:border-color .2s,background .2s}
.btn-ghost:hover{background:var(--off);border-color:var(--k)}
.btn-link{display:inline-flex;align-items:center;gap:8px;font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--k);transition:gap .2s}
.btn-link::after{content:'↗';color:var(--acc);transition:transform .2s}
.btn-link:hover{gap:14px}
.btn-link:hover::after{transform:translate(2px,-2px)}
.divider{height:1px;background:var(--line)}

/* ── BLOBS ─────────────────────────────────── */





33%{transform:rotate(16deg) scale(1.03)}66%{transform:rotate(9deg) scale(0.97)}}
50%{transform:rotate(-8deg) translateY(-14px)}}
50%{transform:rotate(10deg)}}

/* ── MARQUEE ───────────────────────────────── */
.marquee{overflow:hidden;border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:12px 0;background:var(--off)}
.mq-in{display:flex;width:max-content;animation:mq 36s linear infinite}
.mq-it{display:flex;align-items:center;gap:26px;padding:0 26px;font-family:var(--fd);font-size:12px;font-weight:400;letter-spacing:.12em;text-transform:uppercase;color:var(--mid);white-space:nowrap}
.mq-dot{width:4px;height:4px;border-radius:50%;background:var(--acc)}
@keyframes mq{from{transform:translateX(0)}to{transform:translateX(-50%)}}

/* ── NUMBERS ───────────────────────────────── */
.numbers{border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(4,1fr)}
.nb{padding:44px 40px;border-right:1px solid var(--line);position:relative;overflow:hidden}
.nb:last-child{border-right:none}
.nb::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--acc);transform:scaleX(0);transform-origin:left;transition:transform .4s cubic-bezier(.16,1,.3,1)}
.nb:hover::before{transform:scaleX(1)}
.nb-val{font-family:var(--fd);font-size:54px;font-weight:500;line-height:1;margin-bottom:8px;letter-spacing:-.01em;text-transform:uppercase}
.nb-val em{font-style:italic;font-weight:300;font-size:38px;color:var(--acc)}
.nb-label{font-size:10px;text-transform:uppercase;letter-spacing:.2em;color:var(--mid);font-weight:500}

/* ── FOOTER ────────────────────────────────── */
.footer{padding:24px 44px;border-top:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px}
.footer-logo{font-size:11px;font-weight:600;letter-spacing:.26em;text-transform:uppercase}
.footer-nav{display:flex;gap:24px}
.footer-nav a{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--mid);transition:color .2s}
.footer-nav a:hover{color:var(--k)}
.footer-copy{font-size:11px;color:var(--line)}

/* ══════════════════════════
   HOME
══════════════════════════ */
.hero{min-height:100vh;padding:120px 44px 72px;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:space-between}
.hero-ey{display:flex;align-items:center;gap:10px;font-size:10px;font-weight:500;letter-spacing:.28em;text-transform:uppercase;color:var(--mid);margin-bottom:28px;position:relative;z-index:1}
.ey-dot{width:6px;height:6px;border-radius:50%;background:var(--acc)}
.hero-t{font-family:var(--fd);font-size:clamp(80px,11vw,160px);font-weight:500;line-height:.9;letter-spacing:-.01em;text-transform:uppercase;position:relative;z-index:1}
.hero-t .it{font-style:italic;font-weight:300}
.aw{position:relative;display:inline-block}
.aw::after{content:'';position:absolute;left:0;bottom:5px;width:100%;height:6px;background:var(--acc);z-index:-1;transform:skewX(-4deg)}
.hero-bot{position:relative;z-index:1;display:flex;align-items:flex-end;justify-content:space-between;padding-top:48px}
.hero-sub{font-size:14px;font-weight:300;color:var(--mid);line-height:1.85;max-width:300px}
.hero-sub strong{color:var(--k);font-weight:500}
.hero-scroll{display:flex;align-items:center;gap:10px;font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--line)}
.sc-tick{width:1px;height:32px;background:var(--line);animation:tick 2s ease-in-out infinite}
@keyframes tick{0%,100%{opacity:.2}50%{opacity:1}}

/* Home work preview */
.home-work-hd{display:flex;align-items:baseline;justify-content:space-between;padding:72px 44px 32px}
.home-work-ct{font-size:11px;color:var(--line)}
.proj-row{display:grid;grid-template-columns:52px 1fr auto;align-items:center;gap:24px;padding:22px 44px;border-bottom:1px solid var(--line);color:var(--k);position:relative;overflow:hidden}
.proj-row::after{content:'';position:absolute;inset:0;background:var(--off);transform:translateY(101%);transition:transform .36s cubic-bezier(.16,1,.3,1);z-index:0}
.proj-row::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--acc);transform:scaleY(0);transform-origin:bottom;transition:transform .36s cubic-bezier(.16,1,.3,1);z-index:2}
.proj-row:hover::after{transform:translateY(0)}
.proj-row:hover::before{transform:scaleY(1)}
.proj-row>*{position:relative;z-index:1}
.pn{font-size:11px;color:var(--line);letter-spacing:.1em}
.pb{display:flex;flex-direction:column;gap:2px}
.pname{font-family:var(--fd);font-size:clamp(26px,3vw,40px);font-weight:500;line-height:1;text-transform:uppercase;transition:transform .36s cubic-bezier(.16,1,.3,1)}
.proj-row:hover .pname{transform:translateX(6px)}
.ptags{font-size:11px;color:var(--mid);letter-spacing:.05em}
.pr{display:flex;align-items:center;gap:24px}
.pyr{font-size:11px;color:var(--line);letter-spacing:.1em}
.pthumb{width:120px;height:76px;overflow:hidden;flex-shrink:0;opacity:0;transform:translateY(5px) scale(.94);transition:opacity .3s,transform .3s cubic-bezier(.16,1,.3,1)}
.proj-row:hover .pthumb{opacity:1;transform:translateY(0) scale(1)}
.pthumb-bg{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.35);font-family:var(--fd)}
.parr{font-size:15px;color:var(--line);transition:transform .26s,color .26s}
.proj-row:hover .parr{transform:translate(3px,-3px);color:var(--k)}
.bg-ryvdoll{background:linear-gradient(135deg,#2d0e1a,#4a1528)}
.bg-solar{background:linear-gradient(135deg,#1a2a08,#2d4a0e)}
.bg-health{background:linear-gradient(135deg,#08142a,#0e2048)}
.bg-nomad{background:linear-gradient(135deg,#1a1208,#302010)}
.bg-botanica{background:linear-gradient(135deg,#0d1a08,#1a2e0e)}
.bg-lancio{background:linear-gradient(135deg,#080d1a,#10182e)}

/* Home about */
.h-about{padding:80px 44px;display:grid;grid-template-columns:1fr 1fr;gap:100px;position:relative;overflow:hidden}
.h-about::after{content:'';position:absolute;bottom:-70px;left:-70px;width:260px;height:220px;background:var(--acc);border-radius:44% 56% 62% 38%/58% 44% 56% 42%;opacity:.08;pointer-events:none;animation:m2 20s ease-in-out infinite}
.h-at{font-family:var(--fd);font-size:clamp(36px,5vw,64px);font-weight:500;line-height:1;text-transform:uppercase;margin-top:16px}
.h-at em{font-style:italic;font-weight:300}
.h-at .acc{color:var(--acc)}
.h-ar{padding-top:48px}
.h-txt{font-size:14px;font-weight:300;color:var(--mid);line-height:1.9;margin-bottom:28px}
.h-txt strong{color:var(--k);font-weight:500}
.svcs{display:flex;flex-direction:column}
.svc{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid var(--line);font-size:13px;transition:color .2s}
.svc:first-child{border-top:1px solid var(--line)}
.svc-arr{color:var(--line);transition:color .2s,transform .2s}
.svc:hover .svc-arr{color:var(--acc);transform:translate(2px,-2px)}

/* CTA block */
.cta-blk{padding:120px 44px;border-top:1px solid var(--line);position:relative;overflow:hidden}


.cta-in{position:relative;z-index:1}
.cta-sup{font-size:10px;font-weight:600;letter-spacing:.28em;text-transform:uppercase;color:var(--mid);margin-bottom:32px;display:flex;align-items:center;gap:10px}
.cta-sup::before{content:'';width:18px;height:1.5px;background:var(--acc)}
.cta-t{font-family:var(--fd);font-size:clamp(52px,8vw,112px);font-weight:500;line-height:.9;letter-spacing:-.015em;text-transform:uppercase;margin-bottom:52px}
.cta-t em{font-style:italic;font-weight:300}
.cta-row{display:flex;align-items:center;gap:20px;flex-wrap:wrap}

/* ══════════════════════════
   WORK PAGE
══════════════════════════ */
.work-pg{}
.work-hero{padding:100px 44px 56px;border-bottom:1px solid var(--line);position:relative;overflow:hidden}

.work-hero-in{position:relative;z-index:1}
.work-title{font-family:var(--fd);font-size:clamp(60px,8vw,120px);font-weight:500;line-height:.9;text-transform:uppercase;letter-spacing:-.01em}
.work-title em{font-style:italic;font-weight:300}
.work-sub{font-size:13px;font-weight:300;color:var(--mid);line-height:1.8;max-width:380px;margin-top:28px}

/* Filter tabs */
.filters{display:flex;gap:0;padding:0 44px;border-bottom:1px solid var(--line);overflow-x:auto}
.ftab{font-size:11px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--mid);padding:16px 22px;border-bottom:2px solid transparent;transition:color .2s,border-color .2s;white-space:nowrap}
.ftab:hover{color:var(--k)}
.ftab.on{color:var(--k);border-bottom-color:var(--acc)}

/* Work grid — masonry-style */
.work-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--line)}
.wcard{position:relative;overflow:hidden;aspect-ratio:3/2}
.wcard.tall{aspect-ratio:3/4;grid-row:span 2}
.wcard-bg{position:absolute;inset:0;transition:transform .55s cubic-bezier(.25,.46,.45,.94)}
.wcard:hover .wcard-bg{transform:scale(1.05)}
.wcard-ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(12,12,11,.92) 0%,rgba(12,12,11,.05) 65%,transparent 100%);transition:opacity .3s}
.wcard:hover .wcard-ov{opacity:.8}
.wcard-play{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:50px;height:50px;border-radius:50%;border:1.5px solid rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .3s,border-color .3s,background .3s}
.wcard:hover .wcard-play{opacity:1;border-color:var(--acc);background:var(--acc)}
.wcard-play svg{width:16px;height:16px;margin-left:3px}
.wcard-play polygon{fill:var(--k)}
.wcard-c{position:absolute;bottom:0;left:0;right:0;padding:24px 28px;transform:translateY(4px);transition:transform .3s}
.wcard:hover .wcard-c{transform:translateY(0)}
.wcard-tag{font-size:9px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--acc);margin-bottom:6px;opacity:.9}
.wcard-nm{font-family:var(--fd);font-size:clamp(20px,2.5vw,30px);font-weight:500;text-transform:uppercase;color:var(--w);line-height:1}
.wcard-desc{font-size:11px;color:rgba(255,255,255,.45);margin-top:5px;line-height:1.5;max-height:0;overflow:hidden;transition:max-height .3s}
.wcard:hover .wcard-desc{max-height:44px}

/* ══════════════════════════
   PROJECT PAGE
══════════════════════════ */
.proj-pg{}

/* Hero full-bleed */
.proj-cover{height:62vh;min-height:400px;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end;padding:0 44px 44px}
.proj-cover-bg{position:absolute;inset:0}
.proj-cover-ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(12,12,11,.9) 0%,rgba(12,12,11,.15) 65%,rgba(12,12,11,.3) 100%)}
.proj-cover-in{position:relative;z-index:1}
.proj-back{display:inline-flex;align-items:center;gap:8px;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.35);transition:color .2s;margin-bottom:20px}
.proj-back:hover{color:rgba(255,255,255,.8)}
.proj-cover-title{font-family:var(--fd);font-size:clamp(52px,7vw,100px);font-weight:500;line-height:.9;text-transform:uppercase;color:var(--w);letter-spacing:-.01em}
.proj-cover-title em{font-style:italic;font-weight:300}
.proj-cover-row{display:flex;align-items:flex-end;justify-content:space-between;margin-top:20px;flex-wrap:wrap;gap:16px}
.proj-tagline{font-size:14px;font-weight:300;color:rgba(255,255,255,.5);max-width:360px;line-height:1.75}
.proj-yr-badge{font-family:var(--fd);font-size:36px;font-weight:500;color:var(--acc);line-height:1}

/* Meta bar */
.proj-meta-bar{display:flex;gap:0;border-bottom:1px solid var(--line);overflow-x:auto}
.pmb-item{padding:20px 32px;border-right:1px solid var(--line);flex-shrink:0}
.pmb-item:last-child{border-right:none}
.pmb-label{font-size:9px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--mid);margin-bottom:5px}
.pmb-val{font-size:13px;font-weight:500;color:var(--k)}
.pmb-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.ptag{font-size:9px;letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;border:1px solid var(--line);color:var(--mid)}

/* Brief + Challenge */
.proj-brief{padding:64px 44px;display:grid;grid-template-columns:1fr 2fr;gap:72px;border-bottom:1px solid var(--line)}
.pb-left{}
.pb-q{font-family:var(--fd);font-size:clamp(28px,3.5vw,44px);font-weight:500;text-transform:uppercase;line-height:1;margin-top:16px}
.pb-right{}
.pb-lead{font-size:18px;font-weight:300;color:var(--mid);line-height:1.65;margin-bottom:28px}
.pb-lead strong{color:var(--k);font-weight:500}
.pb-body{font-size:14px;font-weight:300;color:var(--mid);line-height:1.9}
.pb-body strong{color:var(--k);font-weight:500}
.pb-body+.pb-body{margin-top:16px}

/* Timeline */
.proj-timeline{padding:64px 44px;background:var(--off);border-bottom:1px solid var(--line)}
.tl-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:0;margin-top:44px;position:relative}
.tl-grid::before{content:'';position:absolute;top:24px;left:0;right:0;height:1px;background:var(--line);z-index:0}
.tl-step{padding:0 16px 0 0;position:relative}
.tl-dot{width:8px;height:8px;border-radius:50%;background:var(--line);border:2px solid var(--w);margin-bottom:16px;position:relative;z-index:1;transition:background .3s}
.tl-step.done .tl-dot{background:var(--acc)}
.tl-step.active .tl-dot{background:var(--k);width:10px;height:10px;margin-top:-1px;border-radius:50%}
.tl-phase{font-size:10px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--mid);margin-bottom:6px}
.tl-step.done .tl-phase{color:var(--k)}
.tl-desc{font-size:12px;font-weight:300;color:var(--mid);line-height:1.6}
.tl-duration{display:inline-block;margin-top:8px;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--acc);font-weight:600}

/* Visual mockups */
.proj-visuals{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line)}
.pvis{position:relative;overflow:hidden;aspect-ratio:4/3;display:flex;align-items:center;justify-content:center}
.pvis.wide{grid-column:span 2;aspect-ratio:16/5}
.pvis-lbl{position:absolute;bottom:20px;left:24px;font-family:var(--fd);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.25)}
.pvis-inner{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:.1}

/* KPI / Results */
.proj-results{padding:64px 44px;border-bottom:1px solid var(--line)}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--line);margin-top:44px}
.kpi-block{background:var(--w);padding:36px 28px;position:relative;overflow:hidden;transition:background .25s}
.kpi-block:hover{background:var(--off)}
.kpi-block::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--acc);transform:scaleX(0);transform-origin:left;transition:transform .4s cubic-bezier(.16,1,.3,1)}
.kpi-block:hover::before{transform:scaleX(1)}

let page='home', projId=null;

function go(p, id){
  document.body.classList.remove('nav-open');
  const app=document.getElementById('app');
  app.classList.add('fade');

    page=p; projId=id||null;

}
function setActiveNav(){

}

    color:'#1a0d2e'
  },
  'ryvdoll-newsletter': {

function visuals(p){
  const data = PROJECT_SCREENS[p.id] || { screens:[], color:'#111' };
  const bg = data.color;

  function screenBlock(s, wide){
    if(!s) return '';
    const ratio = wide ? '16/6' : '4/3';
    if(s.isImg){
      return `<div style="position:relative;${wide?'width:100%':'flex:1'};aspect-ratio:${ratio};overflow:hidden;background:${bg}">
        <img src="${s.src}" style="width:100%;height:100%;object-fit:cover;object-position:top left;display:block"/>
        <div style="position:absolute;bottom:0;left:0;right:0;height:48px;background:linear-gradient(to top,${bg} 10%,transparent)"></div>
        <div style="position:absolute;bottom:14px;left:20px;font-family:var(--fd);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.5)">${s.label}</div>
        <div style="position:absolute;top:10px;right:14px;font-size:9px;letter-spacing:.12em;text-transform:uppercase;background:rgba(0,0,0,.35);color:rgba(255,255,255,.6);padding:3px 10px;border-radius:20px;backdrop-filter:blur(4px)">${s.note}</div>
      </div>`;
    }
    return `<div style="position:relative;${wide?'width:100%':'flex:1'};aspect-ratio:${ratio};overflow:hidden;background:${bg}">
      <iframe src="${s.src}" style="width:${wide?'140%':'150%'};height:${wide?'140%':'150%'};border:none;transform:scale(${wide?'0.714':'0.667'});transform-origin:top left;pointer-events:none;" scrolling="no" loading="lazy"></iframe>
      <div style="position:absolute;bottom:0;left:0;right:0;height:48px;background:linear-gradient(to top,${bg},transparent)"></div>
      <div style="position:absolute;bottom:14px;left:20px;font-family:var(--fd);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.5)">${s.label}</div>
      <div style="position:absolute;top:10px;right:14px;font-size:9px;letter-spacing:.12em;text-transform:uppercase;background:rgba(255,255,255,.08);color:rgba(255,255,255,.55);padding:3px 10px;border-radius:20px">${s.note}</div>
    </div>`;
  }

  const disclaimer = `<div style="aspect-ratio:4/3;flex:1;background:var(--off);border-left:1px solid var(--line);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:32px;text-align:center">
    <svg width="28" height="28" viewBox="0 0 32 32" fill="none"><rect x="4" y="14" width="24" height="16" rx="4" stroke="var(--mid)" stroke-width="1.5"/><path d="M10 14v-4a6 6 0 0112 0v4" stroke="var(--mid)" stroke-width="1.5" stroke-linecap="round"/><circle cx="16" cy="22" r="2" fill="var(--mid)"/></svg>
    <div>
      <div style="font-family:var(--fd);font-size:12px;font-weight:500;text-transform:uppercase;color:var(--mid);letter-spacing:.08em;margin-bottom:6px">Confidential</div>
      <div style="font-size:11px;color:var(--mid);line-height:1.7;max-width:180px">Screenshots on request under NDA</div>
    </div>
  </div>`;

  // Special layout for ryvdoll-newsletter: 5 real screenshots in a grid
  if(data.extra){
    const all = [data.screens[0], ...data.extra];
    const [s0,s1,s2,s3,s4] = all;
    return `
      ${screenBlock(s0, true)}
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line)">
        ${screenBlock(s1, false)}
        ${screenBlock(s2, false)}
        ${screenBlock(s3, false)}
        ${screenBlock(s4, false)}
      </div>`;
  }

  // 4 screenshots layout (lancio: 2 sites + 2 back-offices)
  if(data.screens.length >= 4){
    const [s0,s1,s2,s3] = data.screens;
    return `
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line)">
        ${screenBlock(s0, false)}
        ${screenBlock(s1, false)}
        ${screenBlock(s2, false)}
        ${screenBlock(s3, false)}
      </div>`;
  }

  // Empty state — visuals coming soon
  if(!data.screens || data.screens.length === 0){
    return `<div style="padding:80px 44px;display:flex;align-items:center;justify-content:center;border-bottom:1px solid var(--line)">
      <div style="text-align:center;display:flex;flex-direction:column;align-items:center;gap:16px">
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none"><rect x="3" y="3" width="30" height="30" rx="8" stroke="var(--line)" stroke-width="1.5"/><path d="M12 18h12M18 12v12" stroke="var(--line)" stroke-width="1.5" stroke-linecap="round"/></svg>
        <div style="font-family:var(--fd);font-size:14px;font-weight:500;text-transform:uppercase;letter-spacing:.12em;color:var(--line)">Visuals coming soon</div>
        <div style="font-size:12px;color:var(--line);max-width:260px;line-height:1.7">Screenshots and making-of videos for this project will be published shortly.</div>
      </div>
    </div>`;
  }

  return `
    ${screenBlock(data.screens[0], true)}
    <div style="display:flex;gap:1px;background:var(--line)">
      ${screenBlock(data.screens[1], false)}
      ${disclaimer}
    </div>`;
}

/* ═══════════ RENDER ═══════════ */
function render(){
  const app=document.getElementById('app');
  if(page==='home')         app.innerHTML=renderHome();
  else if(page==='work')    app.innerHTML=renderWork();
  else if(page==='studio')  app.innerHTML=renderStudio();
  else if(page==='contact') app.innerHTML=renderContact();
  else if(page==='project') app.innerHTML=renderProject(projId);
  else app.innerHTML=renderHome();
}

/* ═══════════ INTERACTIONS ═══════════ */
function bind(){
  // hover cursor
  document.querySelectorAll('[onclick],[class*="btn"],[class*="proj-row"],[class*="wcard"],[class*="nb"],[class*="svc"],[class*="ftab"],[class*="tc"],[class*="next-proj"],[class*="sn-link"],[class*="sn-cta"],[class*="sn-logo"]').forEach(el=>{
    el.addEventListener('mouseenter',()=>document.body.classList.add('hov'));
    el.addEventListener('mouseleave',()=>document.body.classList.remove('hov'));
  });
  // reveal
  const obs=new IntersectionObserver(entries=>entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add('in')}),{threshold:.1});
  document.querySelectorAll('.reveal').forEach(el=>obs.observe(el));
  // filters
  document.querySelectorAll('.ftab').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('.ftab').forEach(x=>x.classList.remove('on'));b.classList.add('on')}));
  // form
  const fs=document.getElementById('fsend');
  if(fs) fs.addEventListener('click',()=>{fs.innerHTML='Sent ✓';fs.style.background='#3a9e5f'});
  // featured hover
  const fp=document.getElementById('fplay');
  const fv=fp?.parentElement;
  if(fv){fv.addEventListener('mouseenter',()=>{fp.style.borderColor='var(--acc)';fp.style.background='var(--acc)';fp.querySelector('polygon').setAttribute('fill',getComputedStyle(document.documentElement).getPropertyValue('--k'))});fv.addEventListener('mouseleave',()=>{fp.style.borderColor='rgba(255,255,255,.3)';fp.style.background='transparent';fp.querySelector('polygon').setAttribute('fill','rgba(255,255,255,0.9)')})}
}
